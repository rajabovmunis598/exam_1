<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="url-wrap">

  <!-- NAV -->
  <div class="url-nav">
    <div class="url-nav-left">
      <img src="" alt="logo" class="url-logo">
      <p class="url-nav-desc">One platform meeting all<br>your relocation needs</p>
    </div>
    <div class="url-nav-links">
      <a href="#" class="url-nav-link url-nav-active">Home</a>
      <a href="#" class="url-nav-link">Services ▾</a>
      <a href="#" class="url-nav-link">Blog</a>
      <a href="#" class="url-nav-link">Contact</a>
    </div>
    <button class="url-nav-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"/><polyline points="12 8 16 12 12 16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Take a scoring test
    </button>
  </div>

  <div class="url-hero">
    <div class="url-hero-left">
      <h1 class="url-hero-title">One platform meeting <span class="url-green">all your relocation</span> needs</h1>
      <p class="url-hero-sub">Get a Global Talent Visa and relocate to the UK.<br>Start your journey now</p>
      <div class="url-hero-actions">
        <button class="url-hero-btn">Take a scoring test</button>
        <p class="url-hero-hint">Evaluate your chances and get detailed<br>feedback from our team</p>
      </div>
    </div>
    <div class="url-hero-right">
      <img src="" alt="traveler" class="url-hero-img">
    </div>
  </div>

  <!-- LOGOS -->
  <div class="url-logos">
    <img src="" alt="HSBC" class="url-brand">
    <img src="" alt="Vodafone" class="url-brand">
    <img src="" alt="Revolut" class="url-brand">
    <img src="" alt="Oracle" class="url-brand">
    <img src="" alt="Google" class="url-brand">
    <img src="" alt="Facebook" class="url-brand">
    <img src="" alt="JPMorgan" class="url-brand">
    <img src="" alt="Cisco" class="url-brand">
  </div>

</div>
</body>
</html>
