<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="url-wrap">

  <div class="url-nav">
    <div class="url-nav-left">
      <img src="./logo.png" alt="logo" class="url-logo">
      <p class="url-nav-desc">One platform meeting all<br>your relocation needs</p>
    </div>
    <div class="url-nav-links">
      <a href="#" class="url-nav-link url-nav-active">Home</a>
      <a href="#" class="url-nav-link">Services ▾</a>
      <a href="#" class="url-nav-link">Blog</a>
      <a href="#" class="url-nav-link">Contact</a>
    </div>
    <button class="url-nav-btn">
      &#9654; Take a scoring
    </button>
  </div>

  <div class="url-hero">
    <div class="url-hero-left">
      <h1 class="url-hero-title">
        One platform meeting
        <span class="url-green">all your relocation</span>
        needs
      </h1>
      <p class="url-hero-sub">
        Get a Global Talent Visa and relocate to the UK.
        Start your journey now
      </p>
      <div class="url-hero-actions">
        <button class="url-hero-btn">Take a scoring test</button>
        <p class="url-hero-hint">
          Evaluate your chances and get detailed
          feedback from our team
        </p>
      </div>
    </div>
    <div class="url-hero-right">
      <img src="./OBJECTS.svg" alt="traveler" class="url-hero-img">
    </div>
  </div>


  <div class="url-logos">
    <img src="./Rectangle 1 — копия.svg" alt="HSBC" class="url-brand">
    <img src="./Rectangle 2 — копия.svg" alt="Vodafone" class="url-brand">
    <img src="./Rectangle 3 — копия.svg" alt="Revolut" class="url-brand">
    <img src="./Rectangle 4 — копия.svg" alt="Oracle" class="url-brand">
    <img src="./Rectangle 5 — копия.svg" alt="Google" class="url-brand">
    <img src="./Rectangle 6.svg" alt="Facebook" class="url-brand">
    <img src="./Rectangle 7.svg" alt="JPMorgan" class="url-brand">
    <img src="./Rectangle 24.svg" alt="Cisco" class="url-brand">
  </div>

</div>
</body>
</html>
